<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Left Monitor -->
  <rect x="200" y="100" width="150" height="350" fill="#2d3436" stroke="#74b9ff" stroke-width="4" rx="8"/>
  <rect x="215" y="115" width="120" height="320" fill="#0984e3" opacity="0.4"/>
  
  <!-- Right Monitor -->
  <rect x="450" y="100" width="150" height="350" fill="#2d3436" stroke="#a29bfe" stroke-width="4" rx="8"/>
  <rect x="465" y="115" width="120" height="320" fill="#6c5ce7" opacity="0.4"/>
  
  <!-- Agent circles on left -->
  <circle cx="275" cy="200" r="25" fill="#fdcb6e" opacity="0.9"/>
  <circle cx="275" cy="280" r="20" fill="#fd79a8" opacity="0.8"/>
  
  <!-- Agent circles on right -->
  <circle cx="525" cy="180" r="20" fill="#55efc4" opacity="0.9"/>
  <circle cx="525" cy="250" r="20" fill="#fd79a8" opacity="0.8"/>
  <circle cx="525" cy="320" r="20" fill="#fdcb6e" opacity="0.8"/>
  
  <!-- Title -->
  <text x="400" y="520" text-anchor="middle" fill="white" font-size="28" font-weight="bold">双屏垂直并排</text>
  <text x="400" y="560" text-anchor="middle" fill="#74b9ff" font-size="20">AI 时代的工作视野</text>
</svg>
